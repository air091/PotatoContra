services:
  - type: web
    name: potatocontra
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile.web
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: potatocontra-db
          property: connectionString

databases:
  - name: potatocontra-db
    plan: free
    region: singapore
    databaseName: potatocontra
